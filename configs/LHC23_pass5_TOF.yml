# ── Dataset identity ──────────────────────────────────────────────────────────
dataset:
  label: LHC23_PbPb_pass5          # used in plot titles and output naming
  input_files:
    - /data/galucia/lithium_local/same/LHC23_PbPb_pass5_same.root
    #- /data/galucia/lithium_local/same/LHC25an_pass1_same.root
  tree_name: O2he3hadtable
  folder_name: "DF*"
  variable_names: {
    He: {
      pid_for_tracking: fPIDtrkHe3,
      p: fInnerParamTPCHe3,
      pt: fPtHe3,
      eta: fEtaHe3,
      cluster_size: fItsClusterSizeHe3,
      signal: fSignalTPCHe3,
      mass: fMassTOFHe3,
    },
    Pr: {
      pid_for_tracking: fPIDtrkHad,
      p: fInnerParamTPCHad,
      pt: fPtHad,
      eta: fEtaHad,
      cluster_size: fItsClusterSizeHad,
      signal: fSignalTPCHad,
      mass: fMassTOFHad,
    }
  }

# ── Output ────────────────────────────────────────────────────────────────────
output:
  dir: /home/galucia/DetectorCalibration/output/TOF
  
# ── ITS-specific settings ─────────────────────────────────────────────────────
tof:
  particles: [Pr]             # which particles to calibrate
  x_variable: pt                  # 'beta_gamma' or 'p'

  # Signal model used in the RooFit slice fits
  signal_model: gausexp           # 'gausexp' | 'crystalball' | 'gaus'
  bkg_model: 'exp+exp'              # 'gausexp' | 'gaus'

  # Per-particle fit ranges and histogram binning.
  # x_min_fit / x_max_fit refer to the x_variable (beta_gamma or p).
  Pr:
    x_nbins: 200
    x_min_fit: 0.7
    x_max_fit: 4.0
    x_max_bkg: 0.               # only used when a background component is added

  He:
    x_nbins: 100
    x_min_fit: 0.7
    x_max_fit: 3.0
    x_max_bkg: 0.0