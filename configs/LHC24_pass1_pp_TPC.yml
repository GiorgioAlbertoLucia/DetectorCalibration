# ── Dataset identity ──────────────────────────────────────────────────────────
dataset:
  label: LHC24_pp_pass1          # used in plot titles and output naming
  input_files:
    - /data/galucia/lithium_local/same/LHC24_pass1_skimmed_hadronpid_same.root
  tree_name: O2he3hadtable
  folder_name: "DF*"
  variable_names: {
    He: {
      pid_for_tracking: fPIDtrkHe3,
      p: fInnerParamTPCHe3,
      pt: fPtHe3,
      eta: fEtaHe3,
      cluster_size: fItsClusterSizeHe3,
      signal: fSignalTPCHe3,
    },
    Pr: {
      pid_for_tracking: fPIDtrkHad,
      p: fInnerParamTPCHad,
      pt: fPtHad,
      eta: fEtaHad,
      cluster_size: fItsClusterSizeHad,
      signal: fSignalTPCHad,
    }
  }

# ── Output ────────────────────────────────────────────────────────────────────
output:
  dir: /home/galucia/DetectorCalibration/output/TPC
  
# ── ITS-specific settings ─────────────────────────────────────────────────────
tpc:
  particles: [He, Pr]             # which particles to calibrate
  x_variable: beta_gamma          # 'beta_gamma' or 'p'

  # Signal model used in the RooFit slice fits
  signal_model: gausexp           # 'gausexp' | 'crystalball' | 'gaus'
  bkg_model: gausexp              # 'gausexp' | 'gaus'

  # Per-particle fit ranges and histogram binning.
  # x_min_fit / x_max_fit refer to the x_variable (beta_gamma or p).
  Pr:
    x_nbins: 200
    x_min_fit: 0.5
    x_max_fit: 4.0
    x_max_bkg: 0.               # only used when a background component is added

  He:
    x_nbins: 100
    x_min_fit: 0.65
    x_max_fit: 3.5
    x_max_bkg: 0.0