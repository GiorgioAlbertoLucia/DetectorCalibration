# ── Dataset identity ──────────────────────────────────────────────────────────
dataset:
  label: LHC24_PbPb_pass3          # used in plot titles and output naming
  input_files:
    - /data/galucia/lithium_local/same/LHC24ar_pass3_same.root
  tree_name: O2he3hadtable
  folder_name: "DF*"
  variable_names: {
    He: {
      pid_for_tracking: fPIDtrkHe3,
      pt: fPtHe3,
      eta: fEtaHe3,
      cluster_size: fItsClusterSizeHe3,
    },
    Pr: {
      pid_for_tracking: fPIDtrkHad,
      pt: fPtHad,
      eta: fEtaHad,
      cluster_size: fItsClusterSizeHad,
    }
  }

# ── Output ────────────────────────────────────────────────────────────────────
output:
  dir: /home/galucia/DetectorCalibration/output/ITS
  
# ── ITS-specific settings ─────────────────────────────────────────────────────
its:
  particles: [Pr, He]             # which particles to calibrate
  cluster_size_mode: mean         # 'mean' or 'truncated'
  x_variable: beta_gamma          # 'beta_gamma' or 'p'

  # Signal model used in the RooFit slice fits
  signal_model: crystalball           # 'gausexp' | 'crystalball' | 'gaus'
  bkg_model: gausexp              # 'gausexp' | 'gaus'

  # Per-particle fit ranges and histogram binning.
  # x_min_fit / x_max_fit refer to the x_variable (beta_gamma or p).
  Pr:
    x_nbins: 200
    x_min_fit: 0.5
    x_max_fit: 4.0
    x_max_bkg: 0.9               # only used when a background component is added

  He:
    x_nbins: 100
    x_min_fit: 0.7
    x_max_fit: 3.0
    x_max_bkg: 0.0